name: Test Iranian Sites
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test film2serial
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
          "https://www.film2serial.ir/" \
          -H "User-Agent: Mozilla/5.0")
          echo "film2serial: $CODE"

      - name: Test moviesho
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
          "https://www.moviesho.com/" \
          -H "User-Agent: Mozilla/5.0")
          echo "moviesho: $CODE"

      - name: Test donyayeserial
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
          "https://donyayeserial.com/" \
          -H "User-Agent: Mozilla/5.0")
          echo "donyayeserial: $CODE"
