name: Farsicam Crawler

on:
  workflow_dispatch:
    inputs:
      title_en:
        description: "عنوان انگلیسی"
        required: true
      title_fa:
        description: "عنوان فارسی"
        required: true
      type:
        description: "movie یا tv"
        required: true
        default: "movie"
      season:
        description: "شماره فصل (اختیاری)"
        required: false
        default: ""
      episode:
        description: "شماره قسمت (اختیاری)"
        required: false
        default: ""
      original_lang:
        description: "زبان اصلی اثر"
        required: false
        default: "en"
      cache_key:
        description: "کلید KV برای ذخیره نتیجه"
        required: true
      chat_id:
        description: "آیدی چت تلگرام کاربر"
        required: true
      kv_write_url:
        description: "آدرس Worker برای ذخیره KV"
        required: true

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Crawler
        env:
          TITLE_EN: ${{ github.event.inputs.title_en }}
          TITLE_FA: ${{ github.event.inputs.title_fa }}
          TYPE: ${{ github.event.inputs.type }}
          SEASON: ${{ github.event.inputs.season }}
          EPISODE: ${{ github.event.inputs.episode }}
          ORIGINAL_LANG: ${{ github.event.inputs.original_lang }}
          CACHE_KEY: ${{ github.event.inputs.cache_key }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          KV_WRITE_URL: ${{ github.event.inputs.kv_write_url }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: node crawler.js
